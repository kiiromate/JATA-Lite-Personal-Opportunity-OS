name: Daily Brief

on:
  workflow_dispatch:

jobs:
  brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate brief
        run: pnpm start brief

      - name: Export tracker CSV
        run: pnpm start export

      - name: Upload daily brief and tracker
        uses: actions/upload-artifact@v4
        with:
          name: daily-brief-and-tracker
          path: |
            outputs/daily-brief.md
            outputs/opportunity-tracker.csv
